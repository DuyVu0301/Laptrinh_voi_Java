<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Thêm học phần</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="container mt-5">
    <div class="card p-4 shadow">
      <h2 class="text-primary text-center">Thêm mới học phần</h2>
      <hr />
      <form
        th:action="@{/admin/courses/save}"
        th:object="${course}"
        method="POST"
        enctype="multipart/form-data"
      >
        <div class="mb-3">
          <label class="form-label fw-bold">Tên học phần:</label>
          <input
            type="text"
            th:field="*{name}"
            class="form-control"
            placeholder="Nhập tên môn học"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Số tín chỉ:</label>
          <input
            type="number"
            th:field="*{credits}"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Giảng viên:</label>
          <input
            type="text"
            th:field="*{lecturer}"
            class="form-control"
            required
          />
        </div>

        <div class="mb-3">
          <label class="form-label fw-bold">Hình ảnh môn học:</label>
          <input
            type="file"
            name="imageFile"
            class="form-control"
            accept="image/*"
          />
          <div class="form-text">Chọn file ảnh từ máy tính (jpg, png,...)</div>
        </div>

        <div class="mt-4">
          <button type="submit" class="btn btn-success px-4">Lưu lại</button>
          <a th:href="@{/home}" class="btn btn-secondary px-4">Hủy bỏ</a>
        </div>
      </form>
    </div>
  </body>
</html>
