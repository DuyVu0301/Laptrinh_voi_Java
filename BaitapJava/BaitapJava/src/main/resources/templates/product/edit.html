<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <h2>Edit Product</h2>
    <form th:action="@{/products/edit}" th:object="${product}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Name:</label>
            <input type="text" th:field="*{name}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Price:</label>
            <input type="number" th:field="*{price}" class="form-control" required />
        </div>

        <div class="mb-3">
            <label class="form-label">Current Image URL:</label>
            <input class="form-control" type="text" th:field="*{image}" id="image" readonly>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Change Image:</label>
            <input type="file" name="imageProduct" class="form-control" />
        </div>

        <div class="mb-3">
            <label class="form-label">Category:</label>
            <select th:field="*{category}" class="form-control">
                <option th:each="cat : ${categories}" 
                        th:value="${cat.id}" 
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Update Product</button>
        <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
</body>
</html>
