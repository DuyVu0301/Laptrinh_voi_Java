<!DOCTYPE html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
  layout:decorate="~{product/_layout}"
>
  <head>
    <meta charset="UTF-8" />
    <title>Product List</title>
  </head>
  <body>
    <div layout:fragment="content" class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Danh sách sản phẩm</h2>
        <div class="d-flex gap-2">
          <a th:href="@{/cart}" class="btn btn-outline-success">
            🛒 Giỏ hàng
          </a>
          <a
            sec:authorize="hasRole('ADMIN')"
            th:href="@{/products/add}"
            class="btn btn-primary"
            >Create New Product</a
          >
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-md-4">
          <form th:action="@{/products}" method="get">
            <input type="hidden" name="keyword" th:value="${keyword}" />
            <select
              name="categoryId"
              class="form-select"
              onchange="this.form.submit()"
            >
              <option value="">-- Tất cả danh mục --</option>
              <option
                th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${cat.id == categoryId}"
              ></option>
            </select>
          </form>
        </div>
      </div>

      <table class="table table-hover table-striped">
        <thead class="table-dark">
          <tr>
            <th scope="col">ID</th>
            <th scope="col">Name</th>
            <th scope="col">Image</th>
            <th scope="col">
              <a
                th:href="@{/products(page=${currentPage}, sortField='price', sortDir=${reverseSortDir}, keyword=${keyword}, categoryId=${categoryId})}"
                style="color: white; text-decoration: none"
              >
                Price <span th:text="${sortDir == 'asc' ? '↑' : '↓'}"></span>
              </a>
            </th>
            <th scope="col">Category</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="product : ${products}">
            <th scope="row" th:text="${product.id}"></th>
            <td th:text="${product.name}"></td>
            <td>
              <img
                th:src="${product.image}"
                alt="Product Image"
                style="height: 60px; width: auto; object-fit: cover"
              />
            </td>
            <td
              th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
            ></td>
            <td
              th:text="${product.category != null} ? ${product.category.name} : 'N/A'"
            ></td>
            <td>
              <a
                th:href="@{/cart/add/{id}(id=${product.id})}"
                class="btn btn-sm btn-success"
                >Thêm vào giỏ</a
              >

              <span sec:authorize="hasRole('ADMIN')">
                <a
                  th:href="@{/products/edit/{id}(id=${product.id})}"
                  class="btn btn-sm btn-secondary"
                  >Edit</a
                >
                <a
                  th:href="@{/products/delete/{id}(id=${product.id})}"
                  class="btn btn-sm btn-danger"
                  onclick="return confirm('Are you sure?')"
                  >Delete</a
                >
              </span>
            </td>
          </tr>
        </tbody>
      </table>

      <nav aria-label="Page navigation" th:if="${totalPages > 1}">
        <ul class="pagination justify-content-center">
          <li
            class="page-item"
            th:classappend="${currentPage == 0} ? 'disabled'"
          >
            <a
              class="page-link"
              th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, categoryId=${categoryId}, sortField=${sortField}, sortDir=${sortDir})}"
              >Previous</a
            >
          </li>

          <li
            class="page-item"
            th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
            th:classappend="${currentPage == i} ? 'active'"
          >
            <a
              class="page-link"
              th:href="@{/products(page=${i}, keyword=${keyword}, categoryId=${categoryId}, sortField=${sortField}, sortDir=${sortDir})}"
              th:text="${i + 1}"
            ></a>
          </li>

          <li
            class="page-item"
            th:classappend="${currentPage >= totalPages - 1} ? 'disabled'"
          >
            <a
              class="page-link"
              th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, categoryId=${categoryId}, sortField=${sortField}, sortDir=${sortDir})}"
              >Next</a
            >
          </li>
        </ul>
      </nav>
    </div>
  </body>
</html>
