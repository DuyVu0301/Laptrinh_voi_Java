<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Cập Nhật Học Phần</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="container mt-5">
    <h2 class="text-warning">Cập Nhật Học Phần</h2>
    <hr />
    <form
      th:action="@{/admin/courses/save}"
      th:object="${course}"
      method="POST"
    >
      <input type="hidden" th:field="*{id}" />

      <div class="mb-3">
        <label class="form-label">Tên học phần:</label>
        <input type="text" th:field="*{name}" class="form-control" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Số tín chỉ:</label>
        <input
          type="number"
          th:field="*{credits}"
          class="form-control"
          required
        />
      </div>
      <div class="mb-3">
        <label class="form-label">Giảng viên:</label>
        <input
          type="text"
          th:field="*{lecturer}"
          class="form-control"
          required
        />
      </div>
      <button type="submit" class="btn btn-warning">Cập nhật ngay</button>
      <a th:href="@{/home}" class="btn btn-secondary">Hủy bỏ</a>
    </form>
  </body>
</html>
